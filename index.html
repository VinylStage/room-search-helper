<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>청년 버팀목 전세자금 실전 계산기</title>
  <style>
    /* 다크/라이트 모드 통합 CSS 변수 (기본: 라이트 모드) */
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e2e8f0;
      --highlight-bg: #eff6ff;
      --input-bg: #f1f5f9;
      --alert-color: #ef4444;
      --badge-bg: #e0e7ff;
      --badge-text: #1d4ed8;
      --timeline-box: #f8fafc;
    }

    /* 다크 모드 색상 팔레트 */
    [data-theme="dark"] {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-sub: #cbd5e1;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --border: #334155;
      --highlight-bg: rgba(59, 130, 246, 0.1);
      --input-bg: #0f172a;
      --alert-color: #f87171;
      --badge-bg: rgba(59, 130, 246, 0.2);
      --badge-text: #93c5fd;
      --timeline-box: rgba(15, 23, 42, 0.5);
    }

    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; 
      background-color: var(--bg-color); 
      margin: 0; 
      padding: 20px 16px 40px; 
      color: var(--text-main); 
      transition: background-color 0.3s, color 0.3s;
    }
    .container { 
      max-width: 650px; 
      margin: 0 auto; 
    }
    
    /* 상단 헤더 및 테마 토글 버튼 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    h2 { 
      margin: 0; 
      font-size: 22px; 
      font-weight: 800; 
      color: var(--accent);
    }
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
    }
    .theme-toggle:hover {
      background: var(--input-bg);
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      transition: background-color 0.3s, border-color 0.3s;
    }

    /* 입력 폼 반응형 그리드 */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr; /* 모바일 기본: 1열 */
      gap: 16px;
    }
    @media (min-width: 600px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr); /* PC 화면: 2열 배치 */
      }
      .input-grid .full-width {
        grid-column: span 2;
      }
    }

    .input-group label { 
      display: block; 
      font-size: 14px; 
      font-weight: 700; 
      margin-bottom: 8px; 
      color: var(--text-sub); 
    }
    .input-group input, .input-group select { 
      width: 100%; 
      padding: 14px 16px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 700;
      box-sizing: border-box; 
      background: var(--input-bg); 
      color: var(--text-main);
      outline: none; 
      transition: 0.2s; 
      -webkit-appearance: none; /* 모바일 브라우저 기본 스타일 제거 */
    }
    .input-group input:focus, .input-group select:focus { 
      border-color: var(--accent); 
      background: var(--card-bg);
    }

    .result-box { 
      background: var(--highlight-bg); 
      padding: 20px; 
      border-radius: 12px; 
      border: 1px solid var(--border); 
    }
    .result-row { 
      display: flex; 
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px; 
      font-size: 15px;
      font-weight: 600;
      color: var(--text-sub);
    }
    .result-row span:last-child {
      font-weight: 800; 
      color: var(--text-main);
      font-size: 16px;
    }
    .result-row.total { 
      color: var(--accent); 
      margin-top: 16px; 
      border-top: 2px solid var(--border); 
      padding-top: 16px; 
      margin-bottom: 0;
    }
    .result-row.total span:last-child {
      font-size: 20px;
      color: var(--accent);
    }

    h3 {
      font-size: 18px;
      margin: 0 0 20px 0;
      color: var(--text-main);
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
    }

    /* 타임라인 반응형 최적화 */
    .timeline { 
      padding-left: 16px; 
      border-left: 2px solid var(--border); 
    }
    .timeline-item { 
      position: relative; 
      margin-bottom: 28px; 
      padding-left: 20px; 
    }
    .timeline-item:last-child {
      margin-bottom: 0;
    }
    .timeline-item::before { 
      content: ''; 
      position: absolute; 
      left: -25px; 
      top: 2px; 
      width: 12px; 
      height: 12px; 
      background: var(--accent); 
      border-radius: 50%; 
      border: 4px solid var(--card-bg); 
    }
    .time-title { 
      font-weight: 800; 
      font-size: 16px; 
      color: var(--text-main); 
      margin-bottom: 8px; 
    }
    .time-desc { 
      font-size: 14px; 
      color: var(--text-sub); 
      line-height: 1.6; 
      background: var(--timeline-box);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      word-break: keep-all; /* 모바일에서 단어 끊김 방지 */
    }
    
    .highlight { color: var(--alert-color); font-weight: 700; }
    .badge { display: inline-block; background: var(--badge-bg); color: var(--badge-text); padding: 3px 8px; border-radius: 6px; font-size: 12px; margin-left: 4px; }
    .info-footer { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: 20px; line-height: 1.6; word-break: keep-all; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>🏠 버팀목 실전 계산기</h2>
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
  </div>
  
  <div class="card">
    <div class="input-grid">
      <div class="input-group full-width">
        <label>💰 보유 현금 자산 (단위: 만원)</label>
        <input type="number" id="myCash" value="4000" inputmode="numeric" oninput="calculate()">
      </div>
      <div class="input-group">
        <label>🏦 적용 금리 (%)</label>
        <select id="interestRate" oninput="calculate()">
          <option value="2.1" selected>연 2.1% (중기+전자계약)</option>
          <option value="2.2">연 2.2% (중기청 우대만)</option>
          <option value="2.4">연 2.4% (전자계약 우대만)</option>
          <option value="2.5">연 2.5% (기본 금리)</option>
        </select>
      </div>
      <div class="input-group">
        <label>📋 예상 월 관리비 (단위: 만원)</label>
        <input type="number" id="mgmtFee" value="10" inputmode="numeric" oninput="calculate()">
      </div>
    </div>
  </div>

  <div class="card">
    <h3>💡 자금 기반 최대 한도 분석</h3>
    <div class="result-box">
      <div class="result-row">
        <span>최대 입주 가능 보증금</span>
        <span id="resDeposit">0만원</span>
      </div>
      <div class="result-row">
        <span>은행 대출금 <span class="badge">최대 1.5억</span></span>
        <span id="resLoan">0만원</span>
      </div>
      <div class="result-row">
        <span>매월 대출 이자</span>
        <span id="resInterest">0만원</span>
      </div>
      <div class="result-row total">
        <span>월 총 고정지출 (이자+관리비)</span>
        <span id="resMonthly">0만원</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>⏱️ 계약 및 자금 투입 프로세스</h3>
    <div class="timeline" id="timeline">
      </div>
  </div>
  
  <div class="info-footer">
    ※ 2026년 청년전용 버팀목 규정 반영 (대출한도 1.5억 / 대상주택 보증금 3억 제한)<br>
    ※ 중개수수료는 상한요율(0.3%) 및 부가세 10% 포함으로 어림잡아 계산되었습니다.
  </div>
</div>

<script>
  // 테마 관리 로직 (기기 설정 감지 및 토글)
  function initTheme() {
    const html = document.documentElement;
    const toggleBtn = document.getElementById('themeToggle');
    // 사용자의 OS/브라우저가 다크모드인지 확인
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (prefersDark) {
      html.setAttribute('data-theme', 'dark');
      toggleBtn.innerText = '☀️ 라이트 모드';
    }
  }

  function toggleTheme() {
    const html = document.documentElement;
    const toggleBtn = document.getElementById('themeToggle');
    const currentTheme = html.getAttribute('data-theme');
    
    if (currentTheme === 'dark') {
      html.removeAttribute('data-theme');
      toggleBtn.innerText = '🌙 다크 모드';
    } else {
      html.setAttribute('data-theme', 'dark');
      toggleBtn.innerText = '☀️ 라이트 모드';
    }
  }

  // 계산 로직 (개인정보 수집 없이 클라이언트에서만 동작)
  function calculate() {
    const myCash = Number(document.getElementById('myCash').value) || 0;
    const interestRate = Number(document.getElementById('interestRate').value) || 0;
    const mgmtFee = Number(document.getElementById('mgmtFee').value) || 0;

    const maxLoanLimit = 15000; // 최대 대출 1.5억
    const maxDepositLimit = 30000; // 최대 보증금 3억

    let maxDeposit = 0;
    let finalLoan = 0;

    const optimalDeposit = myCash * 5;

    if (optimalDeposit * 0.8 <= maxLoanLimit) {
      maxDeposit = optimalDeposit;
      finalLoan = maxDeposit * 0.8;
    } else {
      maxDeposit = myCash + maxLoanLimit;
      finalLoan = maxLoanLimit;
    }

    let requiredCash = myCash;
    if (maxDeposit > maxDepositLimit) {
      maxDeposit = maxDepositLimit;
      finalLoan = maxLoanLimit;
      requiredCash = maxDeposit - finalLoan; 
    }

    const monthlyInterest = Math.round((finalLoan * (interestRate / 100)) / 12);
    const totalMonthly = monthlyInterest + mgmtFee;

    const contractFee = Math.round(maxDeposit * 0.05);
    const remainingCash = requiredCash - contractFee;
    const brokerageFee = Math.round(maxDeposit * 0.003 * 1.1);
    const extraCost = 100;

    document.getElementById('resDeposit').innerText = maxDeposit.toLocaleString() + "만원";
    document.getElementById('resLoan').innerText = finalLoan.toLocaleString() + "만원";
    document.getElementById('resInterest').innerText = monthlyInterest.toLocaleString() + "만원";
    document.getElementById('resMonthly').innerText = totalMonthly.toLocaleString() + "만원";

    const timelineHTML = `
      <div class="timeline-item">
        <div class="time-title">[D-45] 가계약 및 방 찜하기</div>
        <div class="time-desc">
          발품을 팔아 조건에 맞는 방을 찾으면 가계약금을 송금하여 집을 선점합니다.<br>
          <span class="highlight">💡 지출: 통상 100~300만원 (내 현금)</span>
        </div>
      </div>
      <div class="timeline-item">
        <div class="time-title">[D-30] 본계약 체결 (5% 납입 필수)</div>
        <div class="time-desc">
          부동산에서 계약서를 작성합니다. 보증금의 5%인 <strong>${contractFee.toLocaleString()}만원</strong>을 입금합니다.<br>
          <span class="highlight">💡 지출: ${contractFee.toLocaleString()}만원 (내 현금)</span><br>
          ※ 5% 납입 영수증과 확정일자가 찍힌 임대차계약서가 있어야 대출 신청이 가능합니다.
        </div>
      </div>
      <div class="timeline-item">
        <div class="time-title">[D-29] 대출 심사 및 HF 보증 가입</div>
        <div class="time-desc">
          기금e든든 또는 은행에 서류를 지참해 대출을 신청합니다. (심사 2~3주 소요)
        </div>
      </div>
      <div class="timeline-item">
        <div class="time-title">[D-Day] 이사 및 최종 잔금 치르기</div>
        <div class="time-desc">
          1. <strong>은행 ➡️ 임대인:</strong> 대출금 <strong>${finalLoan.toLocaleString()}만원</strong> 직접 송금<br>
          2. <strong>나 ➡️ 임대인:</strong> 남은 잔금 <strong>${remainingCash.toLocaleString()}만원</strong> 이체<br>
          3. <strong>부대비용:</strong> 중개수수료(약 <strong>${brokerageFee.toLocaleString()}만원</strong>) 지출<br><br>
          <span class="highlight">💡 당일 필요 현금: 잔금 ${remainingCash.toLocaleString()}만원 + 부대비용(약 ${(brokerageFee + extraCost).toLocaleString()}만원)</span>
        </div>
      </div>
    `;
    document.getElementById('timeline').innerHTML = timelineHTML;
  }

  // 앱 초기화
  initTheme();
  calculate();
</script>

</body>
</html>
